interface GigabitEthernet4/0/0
 ip address 10.0.4.1 255.255.255.252 
#
interface GigabitEthernet4/0/1
 ip address 10.0.4.5 255.255.255.252 
#
interface GigabitEthernet4/0/2
#
interface GigabitEthernet4/0/3
#
interface NULL0
