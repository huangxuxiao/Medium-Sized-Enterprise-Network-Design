ospf 1 router-id 1.1.1.1 
 default-route-advertise always
 area 0.0.0.0 
  network 10.0.2.0 0.0.0.3 
  network 10.0.2.4 0.0.0.3 
  network 10.0.4.0 0.0.0.3 
  network 10.0.4.4 0.0.0.3 
